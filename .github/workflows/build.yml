name: Build DingLian APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup minimal Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 28
        build-tools: 28.0.3

    - name: Build APK
      run: ./gradlew assembleRelease --no-daemon --no-parallel

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: dinglian-apk
        path: app/build/outputs/apk/release/
        if-no-files-found: error
